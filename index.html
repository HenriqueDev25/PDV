<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louisiana PDV - Profissional v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #10b981; --bg-dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; height: 100vh; overflow: hidden; color: #1e293b; }
        
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        .tab-btn { position: relative; color: #94a3b8; transition: all 0.3s; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); border-radius: 12px; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -4px; left: 25%; width: 50%; height: 3px; background: var(--primary); border-radius: 10px; box-shadow: 0 0 10px var(--primary); }

        .grid-pdv { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
        .product-card { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; background: white; border-radius: 1.5rem; padding: 0.75rem; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .img-produto { width: 100%; height: 100px; object-fit: cover; border-radius: 1rem; background: #f1f5f9; }
        
        .carrinho-container { background: var(--bg-dark); box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .carrinho-item { background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary); transition: all 0.2s; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scroll-area { overflow-y: auto; height: 100%; padding-bottom: 120px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-app { display: none !important; }
    </style>
</head>
<body class="flex flex-col">

<div id="loginScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#0f172a] text-white p-6">
    <div class="bg-white/5 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/10 text-center w-full max-w-md">
        <h1 class="text-4xl font-extrabold mb-8">LOUISIANA <span class="text-emerald-500">PDV</span></h1>
        <div class="space-y-4">
            <input type="email" id="loginEmail" placeholder="E-mail" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500/50">
            <input type="password" id="loginPassword" placeholder="Senha" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500/50">
            <button onclick="fazerLoginEmail()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold transition">ENTRAR</button>
        </div>
        <p id="loginError" class="text-red-400 mt-4 text-xs font-bold hidden">Dados incorretos</p>
    </div>
</div>

<div id="appInterface" class="hidden-app flex flex-col h-full">
    <header class="bg-[#0f172a] text-white px-8 py-4 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-black">LOUISIANA <span class="text-emerald-500">PDV</span></h1>
        <nav class="flex gap-2 bg-white/5 p-1.5 rounded-2xl">
            <button onclick="switchTab('venda')" class="tab-btn active px-6 py-2 text-xs font-bold uppercase">Vendas (F1)</button>
            <button onclick="switchTab('estoque')" class="tab-btn px-6 py-2 text-xs font-bold uppercase">Estoque (F2)</button>
            <button onclick="switchTab('historico')" class="tab-btn px-6 py-2 text-xs font-bold uppercase">Relatórios (F3)</button>
            <button onclick="switchTab('config')" class="tab-btn px-6 py-2 text-xs font-bold uppercase">Ajustes (F4)</button>
        </nav>
        <button onclick="logout()" class="text-xs font-bold text-slate-400 hover:text-red-400">Sair</button>
    </header>

    <main class="flex-1 relative overflow-hidden">
        <section id="venda" class="tab-content active">
            <div class="flex h-full p-6 gap-6">
                <div class="flex-[3] flex flex-col gap-6 overflow-hidden">
                    <input type="text" id="inputBusca" placeholder="Pesquisar produto... (F8)" class="w-full bg-white border-2 p-5 rounded-3xl outline-none focus:border-emerald-500 transition-all" oninput="renderizarProdutos()">
                    <div id="gridProdutos" class="grid-pdv scroll-area custom-scroll pr-2"></div>
                </div>

                <div class="flex-1 carrinho-container rounded-[2.5rem] flex flex-col text-white min-w-[380px] overflow-hidden">
                    <div class="p-6 border-b border-white/5 flex justify-between items-center">
                        <span class="font-black text-emerald-500 text-[10px] uppercase">Checkout</span>
                        <span class="text-slate-400 text-xs" id="qtdItens">0 Itens</span>
                    </div>
                    <div id="carrinhoItens" class="flex-1 scroll-area p-4 space-y-3 custom-scroll"></div>
                    <div class="p-8 border-t border-white/5 bg-white/5 backdrop-blur-md">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-slate-400">Total</span>
                            <span id="totalVenda" class="text-4xl font-black">R$ 0,00</span>
                        </div>
                        <button onclick="finalizarVenda()" class="w-full bg-emerald-600 hover:bg-emerald-500 p-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition">FINALIZAR VENDA (F9)</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="estoque" class="tab-content">
            <div class="p-8 flex flex-col h-full gap-8 overflow-y-auto custom-scroll">
                <div class="bg-white p-8 rounded-[2rem] border">
                    <h2 class="text-lg font-bold mb-6" id="tituloForm">Novo Produto</h2>
                    <form id="formProd" class="grid grid-cols-4 gap-4">
                        <input type="hidden" id="editId">
                        <div class="col-span-2"><input type="text" id="nome" placeholder="Nome" class="w-full p-4 border rounded-2xl outline-none focus:border-emerald-500" required></div>
                        <input type="text" id="cod" placeholder="EAN" class="p-4 border rounded-2xl font-mono">
                        <input type="number" id="preco" placeholder="Venda R$" step="0.01" class="p-4 border rounded-2xl" required>
                        <input type="number" id="custo" placeholder="Custo R$" step="0.01" class="p-4 border rounded-2xl" required>
                        <input type="number" id="qtd" placeholder="Quantidade" class="p-4 border rounded-2xl" required>
                        <input type="text" id="imgUrl" placeholder="URL da Imagem" class="col-span-2 p-4 border rounded-2xl">
                        <div class="col-span-4 flex gap-3">
                            <button type="submit" id="btnSalvar" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black uppercase">Salvar Produto</button>
                            <button type="button" onclick="cancelarEdicao()" id="btnCancelEdit" class="hidden px-8 bg-red-50 text-red-500 rounded-2xl font-bold">Cancelar</button>
                        </div>
                    </form>
                </div>
                <div id="listaEstoqueGrid" class="grid-pdv"></div>
            </div>
        </section>

        <section id="historico" class="tab-content">
            <div class="p-8 flex flex-col h-full gap-6">
                <div id="estatisticas" class="flex gap-4"></div>
                <div class="flex-1 bg-white rounded-[2rem] border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                            <tr><th class="p-5">Data</th><th class="p-5">Itens</th><th class="p-5">Total</th><th class="p-5">Lucro</th><th class="p-5 text-right">Ação</th></tr>
                        </thead>
                        <tbody id="corpoTabelaVendas" class="divide-y text-xs"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="config" class="tab-content">
            <div class="p-8 max-w-xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border shadow-sm">
                    <h2 class="text-2xl font-black mb-2">Vínculo Stone</h2>
                    <p class="text-slate-400 text-sm mb-8">Configure o ID da sua maquininha</p>
                    <input type="text" id="stoneTerminalId" placeholder="S/N do Terminal" class="w-full p-5 bg-slate-50 border rounded-2xl font-mono text-xl mb-4 outline-none">
                    <button onclick="salvarConfigStone()" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-black uppercase shadow-lg">Vincular Terminal</button>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 scale-90 transition-all duration-500 bg-emerald-600 text-white px-10 py-5 rounded-[2rem] z-[200] font-black shadow-2xl">
    <span id="toastMsg">Sucesso!</span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBuob65d4nwic1hXTGSsLtc38dEoD1H0zU",
        authDomain: "pdv26-aa76b.firebaseapp.com",
        projectId: "pdv26-aa76b",
        storageBucket: "pdv26-aa76b.firebasestorage.app",
        messagingSenderId: "885941177258",
        appId: "1:885941177258:web:98f2690e07ec0a087cf9d3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let produtos = [], vendas = [], carrinho = [];

    // --- AUTH ---
    window.fazerLoginEmail = async () => {
        const e = document.getElementById('loginEmail').value;
        const s = document.getElementById('loginPassword').value;
        try { await signInWithEmailAndPassword(auth, e, s); } catch (err) { document.getElementById('loginError').classList.remove('hidden'); }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('loginScreen').classList.add('hidden-app');
            document.getElementById('appInterface').classList.remove('hidden-app');
            inicializarDados();
        } else {
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden-app');
            document.getElementById('appInterface').classList.add('hidden-app');
        }
    });

    function inicializarDados() {
        if (!currentUser) return;
        onSnapshot(collection(db, `usuarios/${currentUser.uid}/produtos`), (snap) => {
            produtos = snap.docs.map(d => ({ firebaseId: d.id, ...d.data() }));
            window.renderizarProdutos();
            window.renderizarEstoque();
        });
        onSnapshot(query(collection(db, `usuarios/${currentUser.uid}/vendas`), orderBy("data", "desc")), (snap) => {
            vendas = snap.docs.map(d => ({ firebaseId: d.id, ...d.data() }));
            window.renderizarHistorico();
        });
        onSnapshot(collection(db, `usuarios/${currentUser.uid}/pedidos_vincular`), (snap) => {
            snap.docChanges().forEach(async (change) => {
                if (change.type === "added") {
                    const pedido = change.doc.data();
                    pedido.itens.forEach(item => {
                        const pLocal = produtos.find(p => p.nome === item.nome || p.cod === item.cod);
                        if(pLocal) for(let i=0; i<item.qtd; i++) window.addCarrinho(pLocal.firebaseId);
                    });
                    window.notificar("🔔 Pedido vindo da Stone!");
                    await deleteDoc(doc(db, `usuarios/${currentUser.uid}/pedidos_vincular`, change.doc.id));
                }
            });
        });
    }

    // --- ESTOQUE (EDITAR/CADASTRAR) ---
    window.editarProduto = (id) => {
        const p = produtos.find(x => x.firebaseId === id);
        document.getElementById('editId').value = id;
        document.getElementById('nome').value = p.nome;
        document.getElementById('cod').value = p.cod;
        document.getElementById('preco').value = p.preco;
        document.getElementById('custo').value = p.custo;
        document.getElementById('qtd').value = p.estoque;
        document.getElementById('imgUrl').value = p.img;
        document.getElementById('tituloForm').innerText = "Editando Produto";
        document.getElementById('btnSalvar').innerText = "ATUALIZAR PRODUTO";
        document.getElementById('btnCancelEdit').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.cancelarEdicao = () => {
        document.getElementById('formProd').reset();
        document.getElementById('editId').value = "";
        document.getElementById('tituloForm').innerText = "Novo Produto";
        document.getElementById('btnSalvar').innerText = "Salvar no Inventário";
        document.getElementById('btnCancelEdit').classList.add('hidden');
    };

    document.getElementById('formProd').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const p = {
            nome: document.getElementById('nome').value,
            cod: document.getElementById('cod').value || '0',
            preco: parseFloat(document.getElementById('preco').value),
            custo: parseFloat(document.getElementById('custo').value),
            estoque: parseInt(document.getElementById('qtd').value),
            img: document.getElementById('imgUrl').value
        };

        try {
            if(id) {
                await updateDoc(doc(db, `usuarios/${currentUser.uid}/produtos`, id), p);
                window.notificar("Produto atualizado!");
            } else {
                await addDoc(collection(db, `usuarios/${currentUser.uid}/produtos`), p);
                window.notificar("Produto cadastrado!");
            }
            window.cancelarEdicao();
        } catch (err) { window.notificar("Erro ao salvar."); }
    };

    // --- VENDAS ---
    window.addCarrinho = (fbId) => {
        const prod = produtos.find(p => p.firebaseId === fbId);
        if(!prod || prod.estoque <= 0) return window.notificar("Sem estoque!");
        const item = carrinho.find(i => i.firebaseId === fbId);
        item ? item.qtd++ : carrinho.push({...prod, qtd: 1});
        window.atualizarCarrinho();
    };

    window.atualizarCarrinho = () => {
        const lista = document.getElementById('carrinhoItens');
        let total = 0;
        lista.innerHTML = carrinho.map((item, idx) => {
            total += (item.preco * item.qtd);
            return `<div class="carrinho-item p-4 rounded-2xl flex justify-between items-center text-xs">
                <div class="flex items-center gap-3 overflow-hidden">
                    <img src="${item.img}" class="w-10 h-10 rounded-lg object-cover bg-white/10 shrink-0" onerror="this.src='https://via.placeholder.com/50'">
                    <div class="truncate">
                        <p class="font-bold truncate text-white">${item.nome}</p>
                        <p class="text-emerald-400 font-black">${item.qtd}x R$ ${item.preco.toFixed(2)}</p>
                    </div>
                </div>
                <button onclick="removerItemCarrinho(${idx})" class="text-slate-500 hover:text-red-400 p-2 ml-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"></path></svg>
                </button>
            </div>`;
        }).join('');
        document.getElementById('totalVenda').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('qtdItens').innerText = `${carrinho.reduce((a,b)=>a+b.qtd,0)} Itens`;
    };

    window.finalizarVenda = async () => {
        if(carrinho.length === 0) return;
        const batch = writeBatch(db);
        let totalV = 0, lucroV = 0;
        carrinho.forEach(item => {
            totalV += (item.preco * item.qtd);
            lucroV += (item.preco - item.custo) * item.qtd;
            batch.update(doc(db, `usuarios/${currentUser.uid}/produtos`, item.firebaseId), { estoque: item.estoque - item.qtd });
        });
        await addDoc(collection(db, `usuarios/${currentUser.uid}/vendas`), {
            data: new Date().toISOString(), total: totalV, lucro: lucroV,
            itens: carrinho.map(i => `${i.qtd}x ${i.nome}`).join(', ')
        });
        await batch.commit();
        window.limparCarrinho();
        window.notificar("Venda Concluída!");
    };

    // --- RENDER ---
    window.renderizarProdutos = () => {
        const grid = document.getElementById('gridProdutos');
        const busca = document.getElementById('inputBusca').value.toLowerCase();
        const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(busca) || p.cod.includes(busca));
        grid.innerHTML = filtrados.map(p => `
            <div class="product-card flex flex-col h-full" onclick="addCarrinho('${p.firebaseId}')">
                <img src="${p.img}" class="img-produto mb-3" onerror="this.src='https://via.placeholder.com/150'">
                <h3 class="font-bold text-[10px] uppercase line-clamp-2 text-slate-600 mb-2">${p.nome}</h3>
                <div class="mt-auto flex justify-between items-end">
                    <span class="font-black text-sm text-slate-900">R$ ${p.preco.toFixed(2)}</span>
                    <span class="text-[8px] bg-slate-100 px-1.5 py-1 rounded font-black">${p.estoque} UN</span>
                </div>
            </div>`).join('');
    };

    window.renderizarEstoque = () => {
        const grid = document.getElementById('listaEstoqueGrid');
        grid.innerHTML = produtos.map(p => `
            <div class="bg-white p-4 rounded-3xl border flex flex-col h-full">
                <img src="${p.img}" class="img-produto mb-3" onerror="this.src='https://via.placeholder.com/150'">
                <h3 class="font-bold text-xs uppercase truncate">${p.nome}</h3>
                <p class="text-[10px] font-mono text-slate-400 mb-4">${p.cod}</p>
                <div class="mt-auto flex gap-2">
                    <button onclick="editarProduto('${p.firebaseId}')" class="flex-1 bg-slate-100 text-slate-700 py-2 rounded-xl text-[10px] font-bold uppercase">Editar</button>
                    <button onclick="removerProd('${p.firebaseId}')" class="bg-red-50 text-red-500 p-2 rounded-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"></path></svg></button>
                </div>
            </div>`).join('');
    };

    window.renderizarHistorico = () => {
        const corpo = document.getElementById('corpoTabelaVendas');
        const stats = document.getElementById('estatisticas');
        let f = 0, l = 0;
        vendas.forEach(v => { f += v.total; l += v.lucro; });
        stats.innerHTML = `
            <div class="bg-white p-6 rounded-3xl border flex-1 shadow-sm">
                <p class="text-[10px] uppercase font-black text-slate-400">Vendas</p>
                <p class="text-2xl font-black">R$ ${f.toFixed(2)}</p>
            </div>
            <div class="bg-emerald-600 text-white p-6 rounded-3xl flex-1 shadow-xl">
                <p class="text-[10px] uppercase font-black text-emerald-200">Lucro</p>
                <p class="text-2xl font-black">R$ ${l.toFixed(2)}</p>
            </div>`;
        corpo.innerHTML = vendas.map(v => `
            <tr class="hover:bg-slate-50">
                <td class="p-5 font-bold text-slate-400">${new Date(v.data).toLocaleString()}</td>
                <td class="p-5 truncate max-w-xs font-medium">${v.itens}</td>
                <td class="p-5 font-black text-slate-800">R$ ${v.total.toFixed(2)}</td>
                <td class="p-5 text-emerald-600 font-bold">R$ ${v.lucro.toFixed(2)}</td>
                <td class="p-5 text-right"><button onclick="removerVenda('${v.firebaseId}')" class="text-red-400 font-bold text-[10px] uppercase">Apagar</button></td>
            </tr>`).join('');
    };

    // --- UTIL ---
    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelector(`button[onclick="switchTab('${id}')"]`).classList.add('active');
    };
    window.removerItemCarrinho = (idx) => { carrinho.splice(idx,1); window.atualizarCarrinho(); };
    window.limparCarrinho = () => { carrinho = []; window.atualizarCarrinho(); };
    window.removerVenda = async (id) => { if(confirm("Apagar venda?")) await deleteDoc(doc(db, `usuarios/${currentUser.uid}/vendas`, id)); };
    window.removerProd = async (id) => { if(confirm("Apagar produto?")) await deleteDoc(doc(db, `usuarios/${currentUser.uid}/produtos`, id)); };
    window.salvarConfigStone = async () => {
        const tid = document.getElementById('stoneTerminalId').value.trim();
        if(!tid) return window.notificar("Informe o ID");
        await setDoc(doc(db, `usuarios/${currentUser.uid}/config`, 'stone'), { terminalId: tid });
        await setDoc(doc(db, `terminais_pedidos`, tid), { ownerUid: currentUser.uid });
        window.notificar("Stone Vinculada!");
    };
    window.notificar = (msg) => {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        t.classList.replace('opacity-0', 'opacity-100');
        t.classList.replace('scale-90', 'scale-100');
        setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); t.classList.replace('scale-100', 'scale-90'); }, 3000);
    };
    window.logout = () => signOut(auth).then(() => location.reload());
    window.addEventListener('keydown', (e) => {
        if (e.key === 'F1') window.switchTab('venda');
        if (e.key === 'F2') window.switchTab('estoque');
        if (e.key === 'F3') window.switchTab('historico');
        if (e.key === 'F4') window.switchTab('config');
        if (e.key === 'F9') window.finalizarVenda();
    });
</script>
</body>
</html>
